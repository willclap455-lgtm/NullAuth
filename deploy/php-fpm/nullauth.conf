[nullauth]
user = www-data
group = www-data
listen = /run/php/nullauth.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

catch_workers_output = yes
decorate_workers_output = no
clear_env = yes

php_admin_flag[expose_php] = off
php_admin_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/www/nullauth/var/log/php-error.log
php_admin_value[open_basedir] = /var/www/nullauth:/tmp
php_admin_value[session.save_path] = /var/www/nullauth/var/sessions
php_admin_value[session.use_strict_mode] = 1
php_admin_value[session.cookie_secure] = 1
php_admin_value[session.cookie_httponly] = 1
php_admin_value[session.cookie_samesite] = Lax
php_admin_value[upload_tmp_dir] = /var/www/nullauth/var/uploads
php_admin_value[post_max_size] = 10M
php_admin_value[upload_max_filesize] = 10M
