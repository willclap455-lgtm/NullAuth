# Hardened Nginx example for NullAuth.
# Replace example.internal and certificate paths before production use.

limit_req_zone $binary_remote_addr zone=nullauth_global:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=nullauth_auth:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name passwords.example.internal;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name passwords.example.internal;

    root /var/www/nullauth/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/passwords.example.internal/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/passwords.example.internal/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NullAuthTLS:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    client_max_body_size 10m;
    client_body_timeout 10s;
    keepalive_timeout 15s;

    access_log /var/log/nginx/nullauth.access.log combined;
    error_log /var/log/nginx/nullauth.error.log warn;

    limit_req zone=nullauth_global burst=40 nodelay;

    location = /unlock {
        limit_req zone=nullauth_auth burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /login {
        limit_req zone=nullauth_auth burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/nullauth.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 60s;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(?:env|ini|log|sql|bak|old|orig|save|swp|pem|key|crt|yml|yaml|json|lock|md)$ {
        deny all;
    }

    location ~* ^/(?:src|config|database|docs|deploy|var|vendor|bin)/ {
        deny all;
    }
}
